

[program:nginx]
command=nginx -g "daemon off;"
priority=2
user=www-data
stopasgroup=true
killasgroup=true
autorestart=false
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[program:php-fpm]
command=php-fpm -F
priority=1
user=www-data
stopasgroup=true
killasgroup=true
autorestart=false
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

[group:laravel-web]
programs=nginx,php-fpm
